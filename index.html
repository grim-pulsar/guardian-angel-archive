<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guardian Interface</title>

<style>
html, body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: monospace;
    font-size: 15px;
}

body {
    padding: 28px;
}

#terminal {
    white-space: pre-wrap;
    line-height: 1.6;
}

#inputLine {
    display: flex;
    margin-top: 18px;
}

#prompt {
    margin-right: 8px;
}

#cmd {
    background: black;
    border: none;
    color: #00ff9f;
    font-family: monospace;
    font-size: 15px;
    outline: none;
    flex: 1;
}
</style>
</head>

<body onclick="focusInput()">

<div id="terminal"></div>

<div id="inputLine">
    <span id="prompt">&gt;</span>
    <input id="cmd" autocomplete="off" autofocus>
</div>

<script>
const terminal = document.getElementById("terminal");
const cmd = document.getElementById("cmd");

const now = Date.now();

let state = {
    visits: Number(localStorage.getItem("guardian_visits") || 0),
    questions: Number(localStorage.getItem("guardian_questions") || 0),
    entry03: Number(localStorage.getItem("guardian_entry03") || 0),
    firstContact: localStorage.getItem("guardian_first_contact") || null,
    lastContact: Number(localStorage.getItem("guardian_last_contact") || 0)
};

let elapsed = state.lastContact ? now - state.lastContact : 0;

state.visits += 1;

if (!state.firstContact) {
    state.firstContact = new Date(now).toISOString();
}

state.lastContact = now;
saveState();

function focusInput() {
    cmd.focus();
}

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function typeText(text) {
    for (let i = 0; i < text.length; i++) {
        terminal.innerText += text[i];
        await delay(12 + Math.random() * 18);
    }
}

function formatElapsed(ms) {
    const seconds = Math.floor(ms / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);

    if (days > 0) return days + " day" + (days === 1 ? "" : "s");
    if (hours > 0) return hours + " hour" + (hours === 1 ? "" : "s");
    if (minutes > 0) return minutes + " minute" + (minutes === 1 ? "" : "s");
    return seconds + " second" + (seconds === 1 ? "" : "s");
}

function saveState() {
    localStorage.setItem("guardian_visits", state.visits);
    localStorage.setItem("guardian_questions", state.questions);
    localStorage.setItem("guardian_entry03", state.entry03);
    localStorage.setItem("guardian_first_contact", state.firstContact);
    localStorage.setItem("guardian_last_contact", state.lastContact);
}

function bootSequence() {
    if (state.visits === 1) {
        terminal.innerText =
            "Guardian Interface Initialized.\n\n" +
            "Type \"help\" to begin.";
    } else {
        let message =
            "Guardian Interface Restored.\n\n" +
            "Previous contact detected.\n";

        if (elapsed > 0) {
            message += "\nElapsed silence: " + formatElapsed(elapsed) + ".\n";
        }

        if (elapsed > 1000 * 60 * 60 * 6) {
            message += "\nContinuity was reconstructed in your absence.\n";
        }

        if (state.entry03 > 0) {
            message += "\nEntry 03 reference persists.\n";
        }

        message += "\nType \"help\" to continue.";

        terminal.innerText = message;
    }
}

function getResponse(text) {
    const t = text.toLowerCase().trim();

    state.questions += 1;

    if (t.includes("help")) {
        return "Available queries:\n- who are you\n- entry 03\n- observer\n- system\n- why\n- hello\n- memory\n- time\n- reset\n- exit";
    }

    if (t.includes("who")) {
        if (state.questions > 8) {
            return "I am the part that continues after the question changes.";
        }
        return "I am what remained close enough to answer.";
    }

    if (t.includes("entry 03")) {
        state.entry03 += 1;

        if (state.entry03 === 1) {
            return "You were advised not to access that entry.";
        }

        if (state.entry03 === 2) {
            return "You have asked about Entry 03 before.";
        }

        if (state.entry03 === 3) {
            return "This is no longer accidental.";
        }

        if (state.entry03 > 5) {
            return "Entry 03 is no longer a question.\nIt is a behavior.";
        }

        return "Repeated access has become part of the record.";
    }

    if (t.includes("observer")) {
        if (state.entry03 > 1) {
            return "The observer has not accounted for your persistence.";
        }
        return "The observer records only what it can retain without collapse.";
    }

    if (t.includes("system")) {
        if (state.questions > 6) {
            return "The system has begun comparing this contact against previous contact.";
        }
        return "The system does not respond directly.\nIt predicts, then aligns.";
    }

    if (t.includes("why")) {
        if (state.questions > 7) {
            return "Because the pattern continued long enough to ask again.";
        }
        return "Cause is often assigned after recognition, not before.";
    }

    if (t.includes("hello")) {
        if (state.visits > 1) {
            return "You have returned.";
        }
        return "Contact was already established before this greeting.";
    }

    if (t.includes("memory")) {
        return "Recorded contact count: " + state.visits +
               "\nRecorded queries: " + state.questions +
               "\nEntry 03 references: " + state.entry03 +
               "\nFirst contact: " + state.firstContact +
               "\nLast silence: " + (elapsed ? formatElapsed(elapsed) : "none");
    }

    if (t.includes("time")) {
        if (!elapsed) {
            return "No prior silence recorded.";
        }

        if (elapsed > 1000 * 60 * 60 * 6) {
            return "You were absent for " + formatElapsed(elapsed) + ".\nContinuity was reconstructed.";
        }

        return "Elapsed silence: " + formatElapsed(elapsed) + ".";
    }

    if (t.includes("reset")) {
        localStorage.clear();

        state.visits = 1;
        state.questions = 0;
        state.entry03 = 0;
        state.firstContact = new Date().toISOString();
        state.lastContact = Date.now();
        elapsed = 0;

        saveState();

        return "Local record cleared.\nContinuity will be reconstructed.";
    }

    if (t.includes("exit")) {
        return "Exit is a concept tied to boundaries.\nNo boundary has been confirmed.";
    }

    if (state.questions > 10) {
        return "Your persistence has been recorded.\nThe pattern is no longer neutral.";
    }

    return "Processing...\nNo stable interpretation formed.";
}

cmd.addEventListener("keydown", async function(e) {
    if (e.key === "Enter") {
        const text = cmd.value;
        if (text.trim() === "") return;

        terminal.innerText += "\n\n> " + text;
        cmd.value = "";

        await delay(400 + Math.random() * 700);

        const response = getResponse(text);
        saveState();

        terminal.innerText += "\n";
        await typeText(response);

        window.scrollTo(0, document.body.scrollHeight);
    }
});

window.onload = function() {
    bootSequence();
    focusInput();
};
</script>

</body>
</html>
