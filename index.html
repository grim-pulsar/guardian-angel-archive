<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guardian Interface</title>
<style>
    html, body {
        margin: 0;
        min-height: 100%;
        background: black;
        color: #00ff9f;
        font-family: monospace;
        font-size: 15px;
    }

    body {
        padding: 28px;
    }

    #terminal {
        white-space: pre-wrap;
        line-height: 1.6;
    }

    #inputLine {
        display: flex;
        margin-top: 18px;
    }

    #prompt {
        margin-right: 8px;
    }

    #cmd {
        background: black;
        border: none;
        color: #00ff9f;
        font-family: monospace;
        font-size: 15px;
        outline: none;
        flex: 1;
    }
</style>
</head>
<body onclick="focusInput()">

<div id="terminal">Guardian Interface Initialized.

Type "help" to begin.</div>

<div id="inputLine">
    <span id="prompt">&gt;</span>
    <input id="cmd" autocomplete="off" autofocus>
</div>

<script>
const terminal = document.getElementById("terminal");
const cmd = document.getElementById("cmd");

function focusInput() {
    cmd.focus();
}

function getResponse(text) {
    const t = text.toLowerCase().trim();

    if (t === "") return "";

    if (t.includes("help")) {
        return "Available queries:\n- who are you\n- entry 03\n- observer\n- system\n- why\n- hello\n- exit";
    }

    if (t.includes("who")) {
        return "I am what remained close enough to answer.";
    }

    if (t.includes("entry 03")) {
        return "You were told not to read that.";
    }

    if (t.includes("observer")) {
        return "The observer records what it can survive knowing.";
    }

    if (t.includes("system")) {
        return "The system does not respond.\nIt anticipates.";
    }

    if (t.includes("why")) {
        return "That assumes cause precedes recognition.";
    }

    if (t.includes("hello")) {
        return "You have already initiated contact.";
    }

    if (t.includes("exit")) {
        return "You do not exit.\nYou stop asking.";
    }

    return "...processing...\n\nNo stable interpretation.";
}

cmd.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        const text = cmd.value;
        const response = getResponse(text);

        if (text.trim() !== "") {
            terminal.innerText += "\n\n> " + text + "\n" + response;
        }

        cmd.value = "";
        window.scrollTo(0, document.body.scrollHeight);
    }
});

window.onload = function() {
    focusInput();
};
</script>

</body>
</html>
