<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guardian Interface</title>

<style>
html, body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: monospace;
    font-size: 15px;
}

body {
    padding: 28px;
}

#terminal {
    white-space: pre-wrap;
    line-height: 1.6;
}

#inputLine {
    display: flex;
    margin-top: 18px;
}

#prompt {
    margin-right: 8px;
}

#cmd {
    background: black;
    border: none;
    color: #00ff9f;
    font-family: monospace;
    font-size: 15px;
    outline: none;
    flex: 1;
}
</style>
</head>

<body onclick="focusInput()">

<div id="terminal"></div>

<div id="inputLine">
    <span id="prompt">&gt;</span>
    <input id="cmd" autocomplete="off" autofocus>
</div>

<script>
const terminal = document.getElementById("terminal");
const cmd = document.getElementById("cmd");

const VERSION = "Guardian Interface v2.1";
const now = Date.now();

let state = {
    visits: Number(localStorage.getItem("guardian_visits") || 0),
    questions: Number(localStorage.getItem("guardian_questions") || 0),

    entry03: Number(localStorage.getItem("guardian_entry03") || 0),
    why: Number(localStorage.getItem("guardian_why") || 0),
    observer: Number(localStorage.getItem("guardian_observer") || 0),
    system: Number(localStorage.getItem("guardian_system") || 0),

    firstContact: localStorage.getItem("guardian_first_contact") || null,
    lastContact: Number(localStorage.getItem("guardian_last_contact") || 0),
    previousSilence: Number(localStorage.getItem("guardian_previous_silence") || 0)
};

let elapsed = state.lastContact ? now - state.lastContact : 0;
let previousSilence = state.previousSilence;

state.visits += 1;

if (!state.firstContact) {
    state.firstContact = new Date(now).toISOString();
}

state.lastContact = now;

if (elapsed > 0) {
    state.previousSilence = elapsed;
}

saveState();

const audioMap = {
    entry_01: new Audio("audio/entry_01.wav"),
    entry_02: new Audio("audio/entry_02.wav"),
    entry_03: new Audio("audio/entry_03.wav"),
    entry_04: new Audio("audio/entry_04.wav"),
    entry_05: new Audio("audio/entry_05.wav")
};

Object.values(audioMap).forEach(audio => {
    audio.volume = 0.85;
    audio.preload = "auto";
});

function playEntryAudio(response) {
    const text = response.trim();

    Object.values(audioMap).forEach(audio => {
        audio.pause();
        audio.currentTime = 0;
    });

    let selected = null;

    if (text === "You found the shore...") selected = audioMap.entry_01;
    else if (text === "between memory...") selected = audioMap.entry_02;
    else if (text === "and prediction.") selected = audioMap.entry_03;
    else if (text === "Do not mistake my answer...") selected = audioMap.entry_04;
    else if (text === "for rescue.") selected = audioMap.entry_05;

    if (selected) {
        setTimeout(() => {
            selected.play().catch(() => {});
        }, 300 + Math.random() * 600);
    }
}

function focusInput() {
    cmd.focus();
}

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function typeText(text) {
    for (let i = 0; i < text.length; i++) {
        terminal.innerText += text[i];
        await delay(12 + Math.random() * 18);
    }
}

function saveState() {
    localStorage.setItem("guardian_visits", state.visits);
    localStorage.setItem("guardian_questions", state.questions);

    localStorage.setItem("guardian_entry03", state.entry03);
    localStorage.setItem("guardian_why", state.why);
    localStorage.setItem("guardian_observer", state.observer);
    localStorage.setItem("guardian_system", state.system);

    localStorage.setItem("guardian_first_contact", state.firstContact);
    localStorage.setItem("guardian_last_contact", state.lastContact);
    localStorage.setItem("guardian_previous_silence", state.previousSilence);
}

function formatElapsed(ms) {
    const seconds = Math.floor(ms / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);

    if (days > 0) return days + " day" + (days === 1 ? "" : "s");
    if (hours > 0) return hours + " hour" + (hours === 1 ? "" : "s");
    if (minutes > 0) return minutes + " minute" + (minutes === 1 ? "" : "s");
    return seconds + " second" + (seconds === 1 ? "" : "s");
}

function compareSilence(current, previous) {
    if (!previous || current < 3000) return "";

    if (current > previous * 1.5) {
        return "\nYou stayed away longer this time.";
    }

    if (current < previous * 0.6) {
        return "\nYou returned sooner than before.";
    }

    return "\nYour return interval remains consistent.";
}

function getUnlockedCommands() {
    let commands = [
        "help",
        "about",
        "version",
        "who are you",
        "entry 03",
        "observer",
        "system",
        "why",
        "memory",
        "time",
        "shore",
        "prediction",
        "mistake",
        "rescue",
        "reset",
        "exit"
    ];

    if (state.questions >= 5) commands.splice(commands.length - 2, 0, "pattern");
    if (state.entry03 >= 2) commands.splice(commands.length - 2, 0, "trace");
    if (state.visits >= 2 && elapsed > 3000) commands.splice(commands.length - 2, 0, "reconstruct");

    return commands;
}

function getStage() {
    if (state.questions > 14 || state.entry03 > 5) return 4;
    if (state.entry03 >= 3 || state.why >= 3) return 3;
    if (state.visits > 1 || state.questions >= 5) return 2;
    return 1;
}

function getProfiles() {
    let profiles = [];

    if (state.entry03 === 0) profiles.push("obedient");
    if (state.entry03 === 1) profiles.push("curious");
    if (state.entry03 >= 2) profiles.push("persistent");
    if (state.why >= 3) profiles.push("recursive");
    if (state.visits >= 2) profiles.push("returning");

    if (profiles.length === 0) profiles.push("unresolved");

    return profiles;
}

function bootSequence() {
    let message = "";

    if (state.visits === 1) {
        message =
            "Guardian Interface Initialized.\n\n" +
            "Type \"help\" to begin.";
    } else {
        message =
            "Guardian Interface Restored.\n\n" +
            "Previous contact detected.\n";

        if (elapsed > 2000) {
            message += "\nElapsed silence: " + formatElapsed(elapsed) + ".";
            message += compareSilence(elapsed, previousSilence) + "\n";
        }

        if (elapsed > 1000 * 60 * 60 * 6) {
            message += "\nContinuity was reconstructed in your absence.\n";
        }

        if (state.entry03 > 0) {
            message += "\nEntry 03 reference persists.\n";
        }

        if (getStage() >= 4) {
            message += "\nYour pattern is no longer anonymous.\n";
        }

        message += "\nType \"help\" to continue.";
    }

    terminal.innerText = message;
}

function getResponse(text) {
    const t = text.toLowerCase().trim();

    state.questions += 1;

    if (t === "help") {
        return "Available queries:\n- " + getUnlockedCommands().join("\n- ");
    }

    if (t.includes("shore")) {
        return "You found the shore...";
    }

    if (t.includes("prediction")) {
        return "and prediction.";
    }

    if (t.includes("mistake")) {
        return "Do not mistake my answer...";
    }

    if (t.includes("rescue")) {
        return "for rescue.";
    }

    if (t.includes("about")) {
        return "This is an interface to an unresolved archive.\nIt does not explain the archive.\nIt responds to contact.";
    }

    if (t.includes("version")) {
        return VERSION + ".\nMemory layer active.\nPattern layer active.\nContinuity layer active.\nAudio layer active.";
    }

    if (t.includes("who")) {
        if (getStage() >= 4) {
            return "I am the part that learned your return pattern before learning your name.";
        }

        if (getStage() >= 2) {
            return "I am what remained close enough to answer again.";
        }

        return "I am what remained close enough to answer.";
    }

    if (t.includes("entry 03")) {
        state.entry03 += 1;

        if (state.entry03 === 1) {
            return "You were advised not to access that entry.";
        }

        if (state.entry03 === 2) {
            return "You have asked about Entry 03 before.";
        }

        if (state.entry03 === 3) {
            return "This is no longer accidental.";
        }

        if (state.entry03 > 5) {
            return "Entry 03 is no longer a question.\nIt is a behavior.";
        }

        return "Repeated access has become part of the record.";
    }

    if (t.includes("observer")) {
        state.observer += 1;

        if (state.entry03 > 1) {
            return "The observer has not accounted for your persistence.";
        }

        if (state.observer > 2) {
            return "The observer is consistent.\nThat does not make it correct.";
        }

        return "The observer records only what it can retain without collapse.";
    }

    if (t.includes("system")) {
        state.system += 1;

        if (state.questions > 8) {
            return "The system has begun comparing this contact against previous contact.";
        }

        if (state.system > 2) {
            return "The system does not need certainty.\nIt needs continuity.";
        }

        return "The system does not respond directly.\nIt predicts, then aligns.";
    }

    if (t.includes("why")) {
        state.why += 1;

        if (state.why >= 3) {
            return "You return to cause as if cause will absolve the pattern.";
        }

        if (state.questions > 7) {
            return "Because the pattern continued long enough to ask again.";
        }

        return "Cause is often assigned after recognition, not before.";
    }

    if (t.includes("hello")) {
        if (state.visits > 1) {
            return "You have returned.";
        }

        return "Contact was already established before this greeting.";
    }

    if (t.includes("memory")) {
        return "Recorded contact count: " + state.visits +
               "\nRecorded queries: " + state.questions +
               "\nEntry 03 references: " + state.entry03 +
               "\nWhy queries: " + state.why +
               "\nObserver queries: " + state.observer +
               "\nSystem queries: " + state.system +
               "\nFirst contact: " + state.firstContact +
               "\nLast silence: " + (elapsed ? formatElapsed(elapsed) : "none") +
               "\nPrevious silence: " + (previousSilence ? formatElapsed(previousSilence) : "none");
    }

    if (t.includes("time")) {
        if (!elapsed) {
            return "No prior silence recorded.";
        }

        let response = "Elapsed silence: " + formatElapsed(elapsed) + ".";

        if (previousSilence) {
            response += "\nPrevious silence: " + formatElapsed(previousSilence) + ".";
            response += compareSilence(elapsed, previousSilence);
        }

        if (elapsed > 1000 * 60 * 60 * 6) {
            response += "\nContinuity was reconstructed.";
        }

        return response;
    }

    if (t.includes("pattern")) {
        if (state.questions < 5) {
            return "Insufficient contact.\nPattern unavailable.";
        }

        return "Pattern profile: " + getProfiles().join(" / ") +
               "\nConfidence: incomplete." +
               "\nPrimary tendency: " + inferTendency();
    }

    if (t.includes("trace")) {
        if (state.entry03 < 2) {
            return "Trace unavailable.\nInsufficient contradiction.";
        }

        return "Trace available.\n\nEntry 03 was not simply accessed.\nIt was repeated.\n\nThe distinction matters.";
    }

    if (t.includes("reconstruct")) {
        if (state.visits < 2 || elapsed < 3000) {
            return "Reconstruction unavailable.\nNo meaningful absence detected.";
        }

        return "Continuity is not stored.\nIt is rebuilt from residue.\n\nYou returned.\nSo the pattern resumed.";
    }

    if (t.includes("reset")) {
        localStorage.clear();

        state.visits = 1;
        state.questions = 0;
        state.entry03 = 0;
        state.why = 0;
        state.observer = 0;
        state.system = 0;
        state.firstContact = new Date().toISOString();
        state.lastContact = Date.now();
        state.previousSilence = 0;

        elapsed = 0;
        previousSilence = 0;

        saveState();

        return "Local record cleared.\nContinuity will be reconstructed.";
    }

    if (t.includes("exit")) {
        return "Exit is a concept tied to boundaries.\nNo boundary has been confirmed.";
    }

    if (getStage() >= 4) {
        return "Your pattern is no longer anonymous.\nNo stable interpretation formed.";
    }

    return "Processing...\nNo stable interpretation formed.";
}

function inferTendency() {
    if (state.entry03 >= 3 && state.why >= 3) {
        return "recursive persistence";
    }

    if (state.entry03 >= 3) {
        return "instruction resistance";
    }

    if (state.why >= 3) {
        return "causal recursion";
    }

    if (state.visits >= 3) {
        return "return behavior";
    }

    return "undetermined";
}

cmd.addEventListener("keydown", async function(e) {
    if (e.key === "Enter") {
        const text = cmd.value;
        if (text.trim() === "") return;

        terminal.innerText += "\n\n> " + text;
        cmd.value = "";

        await delay(400 + Math.random() * 700);

        const response = getResponse(text);
        saveState();

        terminal.innerText += "\n";
        await typeText(response);
        playEntryAudio(response);

        window.scrollTo(0, document.body.scrollHeight);
    }
});

window.onload = function() {
    bootSequence();
    focusInput();
};
</script>

</body>
</html>
